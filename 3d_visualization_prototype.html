        // 当前煤堆对象数组
        let coalPiles = [];

        // 创建煤堆函数
        function createCoalPile(x, z, height, color) {
            const radius = 5 + Math.random() * 3;
            const segments = 32;
            const geometry = new THREE.ConeGeometry(radius, height, segments);
            const material = new THREE.MeshPhongMaterial({ color: color });
            const pile = new THREE.Mesh(geometry, material);
            pile.position.set(x, height/2, z);
            pile.rotation.x = Math.PI;
            return pile;
        }

        // 加载堆场数据
        function loadYardData(yardId, date) {
            // 清空现有煤堆
            coalPiles.forEach(pile => scene.remove(pile));
            coalPiles = [];

            // 获取选定堆场和日期的数据
            const yard = yardData[yardId];
            if (!yard) return;

            const dateData = yard.dates[date] || Object.values(yard.dates)[0];
            if (!dateData) return;

            // 获取选定次数
            const timeSelector = document.getElementById('time-selector');
            const time = timeSelector.value || 1;
            const timeData = dateData.times[time] || dateData;

            // 更新页面标题
            document.querySelector('.header h1').textContent = `三维展示 - ${yard.name}`;

            // 更新采集信息
            document.getElementById('acquisition-time').textContent = timeData.acquisitionTime;
            document.getElementById('total-piles').textContent = timeData.piles.length;
            document.getElementById('total-volume').textContent = timeData.totalVolume.toFixed(1) + ' m³';

            // 创建新煤堆并添加到场景
            timeData.piles.forEach(pileData => {
                const pile = createCoalPile(pileData.x, pileData.z, pileData.height, pileData.color);
                pile.userData = { id: pileData.id };
                coalPiles.push(pile);
                scene.add(pile);
            });

            // 更新煤堆列表
            updatePileList(timeData.piles);

            // 重置相机位置
            camera.position.set(30, 30, 30);
            camera.lookAt(0, 0, 0);
        }

        // 更新煤堆列表
        function updatePileList(piles) {
            const pileList = document.getElementById('pile-list');
            pileList.innerHTML = '';
            piles.forEach(pile => {
                const li = document.createElement('li');
                li.className = 'pile-item';
                li.setAttribute('data-id', pile.id);
                li.innerHTML = `
                    <div class="pile-info">
                        <span class="pile-id">货堆 ${pile.id}</span>
                        <span class="pile-volume">${pile.volume.toFixed(2)} m³</span>
                    </div>
                    <div class="pile-status">状态：${pile.status}</div>
                `;
                li.addEventListener('click', () => {
                    document.querySelectorAll('.pile-item').forEach(i => i.classList.remove('active'));
                    li.classList.add('active');
                    // 高亮显示对应的货堆
                    coalPiles.forEach(p => {
                        if (p.userData.id === pile.id) {
                            // 简单高亮效果 - 改变颜色
                            p.material.color.set(0x3498db);
                        } else {
                            // 恢复原始颜色
                            p.material.color.set(0x777777);  // 使用默认灰色
                        }
                    });
                });
                pileList.appendChild(li);  // 修复变量名错误
            });

            // 默认选中第一个货堆
            if (pileList.firstChild) {
                pileList.firstChild.classList.add('active');
                // 触发点击事件以高亮显示第一个货堆
                setTimeout(() => {
                    if (pileList.firstChild) {
                        pileList.firstChild.click();
                    }
                }, 100);
            }
        }

        // 初始加载龙口煤场最新数据
        // 检查URL参数
        function getURLParams() {
            const params = {};
            const queryString = window.location.search.substring(1);
            const pairs = queryString.split('&');
            for (let i = 0; i < pairs.length; i++) {
                const pair = pairs[i].split('=');
                params[pair[0]] = decodeURIComponent(pair[1] || '');
            }
            return params;
        }

        // 获取URL参数
        const urlParams = getURLParams();
        let initialYard = 'longkou';
        let initialDate = '';
        let initialTime = '1';

        // 如果有URL参数，则使用参数值
        if (urlParams.site) {
            initialYard = urlParams.site;
        }

        // 确保initDateSelector和loadYardData函数已定义
        if (typeof initDateSelector === 'function') {
            initDateSelector(initialYard);
        }

        const dateSelector = document.getElementById('date-selector');
        if (dateSelector && typeof loadYardData === 'function') {
            // 如果有日期参数，则使用参数值
            if (urlParams.date) {
                // 查找是否有匹配的日期选项
                let dateFound = false;
                for (let i = 0; i < dateSelector.options.length; i++) {
                    if (dateSelector.options[i].value === urlParams.date) {
                        dateSelector.value = urlParams.date;
                        dateFound = true;
                        break;
                    }
                }
                // 如果没有找到匹配的日期，则使用默认值
                initialDate = dateFound ? urlParams.date : dateSelector.value;
            } else {
                initialDate = dateSelector.value;
            }

            // 加载数据
            loadYardData(initialYard, initialDate);

            // 如果有次数参数，则设置次数选择器
            if (urlParams.time) {
                const timeSelector = document.getElementById('time-selector');
                if (timeSelector) {
                    // 查找是否有匹配的次数选项
                    for (let i = 0; i < timeSelector.options.length; i++) {
                        if (timeSelector.options[i].value === urlParams.time) {
                            timeSelector.value = urlParams.time;
                            break;
                        }
                    }
                }
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth * 2/3 / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth * 2/3, window.innerHeight - 100);
        });

        // 堆场选择器事件
        document.getElementById('yard-selector').addEventListener('change', (e) => {
            const yardId = e.target.value;
            initDateSelector(yardId);
            loadYardData(yardId, document.getElementById('date-selector').value);
        });

        // 日期选择器事件
        document.getElementById('date-selector').addEventListener('change', (e) => {
            const yardId = document.getElementById('yard-selector').value;
            const date = e.target.value;
            initTimeSelector(yardId, date);
        });

        // 次数选择器事件
        document.getElementById('time-selector').addEventListener('change', () => {
            const yardId = document.getElementById('yard-selector').value;
            const date = document.getElementById('date-selector').value;
            loadYardData(yardId, date);
        });

        // 工具按钮事件
        document.getElementById('rotate-btn').addEventListener('click', () => {
            controls.enableRotate = true;
            controls.enablePan = false;
            updateToolButtons('rotate-btn');
        });

        document.getElementById('pan-btn').addEventListener('click', () => {
            controls.enableRotate = false;
            controls.enablePan = true;
            updateToolButtons('pan-btn');
        });

        document.getElementById('zoom-btn').addEventListener('click', () => {
            // 缩放是轨道控制器的默认功能，这里只需更新按钮状态
            updateToolButtons('zoom-btn');
        });

        document.getElementById('measure-btn').addEventListener('click', () => {
            alert('测量功能将在后续版本实现');
            updateToolButtons('measure-btn');
        });

        document.getElementById('annotate-btn').addEventListener('click', () => {
            alert('标注功能将在后续版本实现');
            updateToolButtons('annotate-btn');
        });

        document.getElementById('point-cloud-btn').addEventListener('click', () => {
            // 在原型中，我们只是切换显示模式的按钮状态
            updateDisplayButtons('point-cloud-btn');
        });

        document.getElementById('mesh-btn').addEventListener('click', () => {
            updateDisplayButtons('mesh-btn');
        });

        document.getElementById('texture-btn').addEventListener('click', () => {
            updateDisplayButtons('texture-btn');
        });

        // 清表按钮事件
        document.getElementById('auto-clear-btn').addEventListener('click', () => {
            const yardId = document.getElementById('yard-selector').value;
            const date = document.getElementById('date-selector').value;
            alert(`对${yardData[yardId].name}(${date})执行自动清表功能，正在处理...`);
            // 在实际应用中，这里会执行清表算法并更新三维场景
        });

        document.getElementById('manual-clear-btn').addEventListener('click', () => {
            alert('手动清表功能将在后续版本实现');
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            const yardId = document.getElementById('yard-selector').value;
            const date = document.getElementById('date-selector').value;
            alert('重置场景功能已触发');
            // 重新加载当前堆场和日期的数据
            loadYardData(yardId, date);
        });

        // 更新工具按钮状态
        function updateToolButtons(activeId) {
            document.querySelectorAll('.tool-button').forEach(btn => {
                if (btn.id === 'rotate-btn' || btn.id === 'pan-btn' || btn.id === 'zoom-btn' || 
                    btn.id === 'measure-btn' || btn.id === 'annotate-btn') {
                    btn.classList.remove('active');
                }
            });
            document.getElementById(activeId).classList.add('active');
        }

        // 更新显示按钮状态
        function updateDisplayButtons(activeId) {
            document.querySelectorAll('.tool-button').forEach(btn => {
                if (btn.id === 'point-cloud-btn' || btn.id === 'mesh-btn' || btn.id === 'texture-btn') {
                    btn.classList.remove('active');
                }
            });
            document.getElementById(activeId).classList.add('active');
        }

        // 初始化日期选择器
        function initDateSelector(yardId) {
            const yard = yardData[yardId];
            if (!yard) return;
            
            const dateSelector = document.getElementById('date-selector');
            const dateOptions = Object.keys(yard.dates);
            
            // 清空现有选项
            dateSelector.innerHTML = '';
            
            // 添加所有可用日期
            dateOptions.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = date;
                dateSelector.appendChild(option);
            });
            
            // 设置默认值为最新日期
            if (dateOptions.length > 0) {
                dateSelector.value = dateOptions[0];
            }
            
            // 初始化次数选择器
            initTimeSelector(yardId, dateSelector.value);
        }
        
        // 初始化次数选择器
        function initTimeSelector(yardId, date) {
            const yard = yardData[yardId];
            if (!yard) return;
            
            const dateData = yard.dates[date];
            if (!dateData) return;
            
            const timeSelector = document.getElementById('time-selector');
            
            // 清空现有选项
            timeSelector.innerHTML = '';
            
            // 获取当天的次数 - 默认至少有一次
            const times = Object.keys(dateData.times || {1: {}});
            
            // 添加所有可用次数
            times.forEach(time => {
                const option = document.createElement('option');
                option.value = time;
                option.textContent = `第${time}次`;
                timeSelector.appendChild(option);
            });
        }

        // 加载按钮事件
        document.getElementById('load-btn').addEventListener('click', () => {
            const yardId = document.getElementById('yard-selector').value;
            const date = document.getElementById('date-selector').value;
            loadYardData(yardId, date);
        });
    </script>
</body>
</html>
